          <nav id="menu-bar">
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="videos.html">Videos</a></li>
              <li><a href="gallery.html">Gallery</a></li>
              <li><a href="contact.html">Contact</a></li>
              <li><a href="shop.html">Shop</a></li>
            </ul>

        </div>
        <ul id="social-links">
          <li>
            <a
              href="https://www.instagram.com/fairylandcottage/"
              target="_blank"

              ><i class="fa-brands fa-instagram"></i
            ></a>
          </li>
          <li>
            <a
              href="https://www.youtube.com/fairylandcottage"
              target="_blank"
              rel="noopener"
              aria-label="Our youtube page (opens in new tab)"
              ><i class="fa-brands fa-youtube"></i
            ></a>
          </li>
        </ul>
      </div>
      <p>&#169;2024<br />Fairyland<br />Cottage</p>
    </header>

    <!-- Header for page 768px up-->
    <header class="top-header">
      <a href="index.html"
        ><img
          src="assets/images/logo-fairyland.webp"
          alt="An image of baby succulents in different sized brown jars"
      /></a>
      <h1 id="title">Fairyland Cottage</h1>

      <input type="checkbox" id="nav-toggle2" name="nav-toggle" />
      <label for="nav-toggle" class="nav-toggle-label"
        ><i class="fa-solid fa-ellipsis"></i
      ></label>
      <nav id="menu-bar2">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="videos.html">Videos</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html">Contact Us</a></li>
          <li><a href="shop.html">Shop</a></li>
        </ul>
      </nav>
    </header>

    <!-- main content -->
    <main>
      <h2 class="hidden-heading">Contact form</h2>
      <section id="contact">
        <h2>
          <i class="fa-solid fa-leaf fa-flip-horizontal"></i> say hello
          <i class="fa-solid fa-leaf"></i>
        </h2>
        <p>I&#39;d love to hear from you!</p>
        <!-- Contact form -->
        <form id="contact-form">
          <label for="first-name">First Name:</label>
          <input
            type="text"
            id="first-name"
            name="first_name"
            placeholder="Joe"
            class="text-input"
            required />

          <label for="last-name">Last Name:</label>
          <input
            type="text"
            id="last-name"
            name="last_name"
            placeholder="Blogs"
            class="text-input"
            required />

          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="joeblogs@email.com"
            class="text-input"
            required />

          <label for="message">Message:</label>
          <textarea
            id="message"
            name="message"
            cols="25"
            rows="7"
            placeholder="Type your message..."
            required></textarea>
          <br />
          <button type="submit" class="send-button">Send</button>
        </form>
      </section>
    </main>

    <!-- footer for site -->
    <footer>
      <ul id="social-links2">
        <li>
          <a
            href="https://www.youtube.com/fairylandcottage"
            target="_blank"
            rel="noopener"
            aria-label="Our youtube page (opens in new tab)"
            ><i class="fa-brands fa-youtube"></i
          ></a>
        </li>
        <li>
          <p>&#169;2024 Fairyland Cottage</p>
        </li>
        <li>
          <a
            href="https://www.instagram.com/fairylandcottage/"
            target="_blank"
            rel="noopener"
            aria-label="Our instagram link (opens in new tab)"
            ><i class="fa-brands fa-instagram"></i
          ></a>
        </li>
      </ul>
    </footer>

    <!-- Modal structure -->
    <div id="emailSentModal" class="modal">
      <div class="modal-content">
        <span class="close-button">&times;</span>
        <p>Your email has been sent successfully! Thank you 🏡</p>
      </div>
    </div>

    <!-- Font awesome -->
    <script
      src="https://kit.fontawesome.com/712db90352.js"
      crossorigin="anonymous"></script>

    <!-- JavaScript for modal -->
    <script src="assets/js/modal.js"></script>
    <script
      type="text/javascript"
      src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script type="text/javascript">
      (function () {
        emailjs.init('gZ8YpkFq6fNcY2fqk');
      })();
    </script>
  </body>
